# =============================================================================
# default_source_selection.yaml
#
# Configuration file for superbit_lensing/source_selection/make_background_catalog.py
#
# Single-catalog design:
#   One mega color catalog serves both roles:
#     Training set  : rows where Z_source is NED or DESI (~5,558 objects)
#     Full sample   : all 166,976 rows used for object selection
#
# Usage:
#   python -m superbit_lensing.source_selection.make_background_catalog \
#       -c configs/default_source_selection.yaml
# =============================================================================


# -----------------------------------------------------------------------------
# Input catalog
# -----------------------------------------------------------------------------

color_catalog: /projects/mccleary_group/superbit/color/FINAL_mega_color_mag_catalog_20260402_114934.fits
union_redseq_into_foreground: false


# -----------------------------------------------------------------------------
# Output
# -----------------------------------------------------------------------------

output_dir: /projects/mccleary_group/amit.m/source_selection/results/run2


# -----------------------------------------------------------------------------
# Shapes mode
# -----------------------------------------------------------------------------

shapes: false


# -----------------------------------------------------------------------------
# Clusters to process
# -----------------------------------------------------------------------------

clusters:
  - name: Abell141
    redshift: 0.230

  - name: Abell1689
    redshift: 0.180

  - name: Abell2163
    redshift: 0.200

  - name: Abell2345
    redshift: 0.180

  - name: Abell2384a
    redshift: 0.094

  - name: Abell2384b
    redshift: 0.094

  - name: Abell3365
    redshift: 0.093

  - name: Abell3411
    redshift: 0.170

  - name: Abell3526
    redshift: 0.010

  - name: Abell3571
    redshift: 0.040

  - name: Abell3667
    redshift: 0.060

  - name: Abell3716S
    redshift: 0.045

  - name: Abell3827
    redshift: 0.100

  - name: AbellS0592
    redshift: 0.220

  - name: AbellS780
    redshift: 0.240

  - name: MACSJ0416d1m2403
    redshift: 0.420

  - name: MACSJ0723d3_7327_JWST
