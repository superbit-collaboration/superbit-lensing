  - name: Z20_SPT_CLJ0135m5904
    redshift: 0.510


# -----------------------------------------------------------------------------
# Pixel mask parameters
# -----------------------------------------------------------------------------

pixel_size: 0.05
min_count: 10
err_thresh: 0.5
xlim: [-1.5, 1.0]
ylim: [-1.0, 3.0]
weighting: true


# -----------------------------------------------------------------------------
# Red sequence
# -----------------------------------------------------------------------------

# train with redsequence members
# with_redsequence: true ... the code calls load_and_remove_redseq → RS members are removed from training.
# with_redsequence: false... that function is not called → RS members stay in training.

with_redsequence: false
union_specz_into_foreground: true
redseq_catalog: /projects/mccleary_group/ysp/redseq/combined_colors_mags.fits


# -----------------------------------------------------------------------------
# Tau / validation settings
# -----------------------------------------------------------------------------

tau_sweep: true
purity_threshold: 0.5
tau_values: [0.1, 0.15, 0.2, 0.25, 0.3, 0.35, 0.4, 0.45, 0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8, 0.85, 0.9, 0.95]
n_folds: 5